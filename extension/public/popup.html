<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 300px;
      padding: 1rem;
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    h2 {
      margin: 0 0 1rem 0;
      font-size: 1.2rem;
    }
    p {
      margin: 0.5rem 0;
      color: #666;
      font-size: 0.9rem;
    }
    .button {
      display: block;
      width: 100%;
      padding: 0.75rem;
      margin-top: 1rem;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      text-align: center;
      text-decoration: none;
    }
    .button:hover {
      opacity: 0.9;
    }
  </style>
</head>
<body>
  <div id="root">
    <h2>✨ SlideWeave</h2>
    <p>Open a Google Slides presentation to start using SlideWeave!</p>
    <p style="font-size: 0.8rem; margin-top: 1rem;">The sidebar will appear automatically when you open any presentation.</p>
  </div>
</body>
</html>
